<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buy Now - Signature Private Limited</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="logo"><img src="assets/logo.jpg" alt="Logo"></h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="product.html">Products</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <div class="hero">
        <h1>Thankyou Have A Nice Day</h1>
    </div>
    <main style="background-color: rgb(226, 187, 226);">
        <div class="content">
            <div>
                <h1>Order Form</h1>
                <form action="order.php" method="post">
                    <label for="product">Product:</label>
                    
                    <select id="product" name="product" required>
                        <option value="premium-materials">Premium Materials - ₹2000</option>
                        <option value="wide-range-designs">Wide Range of Designs - ₹2500</option>
                        <option value="scratch-resistant">Scratch and Stain Resistant - ₹2200</option>
                        <option value="easy-maintenance">Easy to Maintain - ₹1800</option>
                        <option value="custom-designs">Custom Designs - ₹3000</option>
                        <option value="high-gloss-matte">High-Gloss and Matte Finishes - ₹2700</option>
                        <option value="moisture-resistant">Moisture Resistant - ₹2100</option>
                        <option value="fire-retardant">Fire Retardant - ₹2800</option>
                        <option value="eco-friendly">Eco-Friendly Options - ₹2600</option>
                        <option value="uv-resistant">UV Resistant - ₹2300</option>
                        <option value="sustainable-choices">Sustainable Choices - ₹2500</option>
                    </select>
                    
                    <br>
                    
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" min="1" required><br>
                    
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required><br>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required><br>
                    
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required><br>
                    
                    <label for="address">Shipping Address:</label>
                    <textarea id="address" name="address" required></textarea><br>
                    
                    <button type="submit" class="button">Place Order</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Signature Laminates Private Limited</p>
    </footer>
</body>
</html>
